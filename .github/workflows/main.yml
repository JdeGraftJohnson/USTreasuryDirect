name: Treasury Auction Monitor

on:
  schedule:
    - cron: '30 18 * * 1-4'   # 18:30 UTC Mon-Thu (after 1PM ET auction close)
    - cron: '30 19 * * 1-4'   # 19:30 UTC backup run
    - cron: '0 13 * * 1'      # Monday 8AM ET — weekly preview

  workflow_dispatch:
    inputs:
      force:
        description: 'Force Discord alert even if data unchanged (true/false)'
        required: false
        default: 'false'
      preview:
        description: 'Send upcoming schedule to Discord (true/false)'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Treasury monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.preview }}" = "true" ]; then
            ARGS="$ARGS --preview"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%H:%M)" = "13:00" ]; then
            ARGS="$ARGS --preview"
          fi
          python treasury_monitor.py $ARGS

      - name: Commit auction data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add treasury_current.json treasury_previous.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update treasury auction data [skip ci]"
          git pull --rebase origin main
          git push
